[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9 && cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @farmagest/shared build",
  "pnpm --filter @farmagest/api build",
  "pnpm --filter @farmagest/api exec prisma generate"
]

[start]
cmd = "cd ../.. && pnpm --filter @farmagest/api exec prisma migrate deploy && node apps/api/dist/main"

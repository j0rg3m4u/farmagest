# build: 2026-05-27
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install -g pnpm@9 && cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @farmagest/shared build",
  "pnpm --filter @farmagest/web build"
]

[start]
cmd = "cd ../.. && pnpm --filter @farmagest/web start"

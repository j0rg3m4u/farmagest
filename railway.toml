[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @farmagest/shared build && pnpm --filter @farmagest/api build"

[deploy]
startCommand = "pnpm --filter @farmagest/api start:prod"
preDeployCommand = "pnpm --filter @farmagest/api exec prisma migrate deploy"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
